{% extends "base.html" %}

{% block title %}Discover NGOs | UnitySync Eco-Discovery{% endblock %}

{% block content %}
<section style="height: calc(100vh - 80px); display: flex;">
    <!-- Sidebar -->
    <div class="glass" style="width: 400px; padding: 40px; overflow-y: auto; z-index: 10; border-radius: 0;">
        <div style="margin-bottom: 40px;">
            <span class="badge" style="background: rgba(79, 70, 229, 0.1); color: var(--primary);">Public Discovery</span>
            <h2 style="font-size: 2rem; margin-top: 15px;">Locate NGOs</h2>
            <p style="color: var(--text-muted); font-size: 0.9rem;">Find verified organizational partners in your community. Transparency and coordination start here.</p>
        </div>

        <div style="margin-bottom: 30px;">
            <label style="display: block; margin-bottom: 10px; font-weight: 600;">Search Category</label>
            <select style="width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 12px;">
                <option value="all">All Organizations</option>
                <option value="hunger">Hunger & Food Relief</option>
                <option value="health">Healthcare Services</option>
                <option value="edu">Education Foundations</option>
                <option value="env">Environment Groups</option>
            </select>
        </div>

        <div id="ngo-list" style="display: flex; flex-direction: column; gap: 20px;">
            <div style="text-align: center; padding: 20px;">
                <p style="color: var(--text-muted);">Loading map data...</p>
            </div>
        </div>
    </div>

    <!-- Map -->
    <div id="discovery-map" style="flex: 1; height: 100%;">
        <!-- Leaflet map -->
    </div>
</section>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    let map;
    document.addEventListener('DOMContentLoaded', async () => {
        map = L.map('discovery-map').setView([17.3850, 78.4867], 13);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap'
        }).addTo(map);

        try {
            const response = await fetch('/api/map-data');
            const result = await response.json();
            
            if (result.status === 'success') {
                const mapData = result.data;
                const listContainer = document.getElementById('ngo-list');
                listContainer.innerHTML = ''; // Clear loading text
                
                if (mapData.length === 0) {
                    listContainer.innerHTML = '<p style="color:var(--text-muted);text-align:center;">No data found matching your rules.</p>';
                    return;
                }

                mapData.forEach(user => {
                    const isNGO = user.role === 'ngo';
                    const color = isNGO ? "#10b981" : "#0ea5e9";
                    const badgeText = isNGO ? 'Verified NGO' : 'Active Volunteer';
                    
                    // Render Map Marker
                    if(user.lat && user.lng) {
                        L.circleMarker([user.lat, user.lng], {
                            radius: 8,
                            fillColor: color,
                            color: "#fff",
                            weight: 2,
                            opacity: 1,
                            fillOpacity: 0.8
                        }).addTo(map).bindPopup(`<strong>${user.name}</strong><br>Status: ${user.status}<br>Type: ${user.role.toUpperCase()}`);
                    }

                    // Render Sidebar Card
                    const card = document.createElement('div');
                    card.className = "feature-card";
                    card.style.cssText = "padding: 20px; border-radius: 12px; cursor: pointer; transition: all 0.3s ease;";
                    if (user.lat && user.lng) {
                        card.onclick = () => focusNGO(user.lat, user.lng);
                    }
                    
                    card.innerHTML = `
                        <h4 style="margin-bottom: 5px;">${user.name}</h4>
                        <p style="font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase;">Type: ${user.role}</p>
                        <span class="badge" style="background: ${color}; color: white; font-size: 0.6rem; margin-top: 10px;">${badgeText}</span>
                    `;
                    listContainer.appendChild(card);
                });
                
                // Set map view to the first marker logically
                if (mapData[0].lat) {
                    map.setView([mapData[0].lat, mapData[0].lng], 12);
                }

            }
        } catch (error) {
            console.error("Failed to load map data:", error);
        }
    });

    function focusNGO(lat, lng) {
        map.setView([lat, lng], 15);
    }
</script>
{% endblock %}
